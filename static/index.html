<head>

    <style>
        :root {
            --accent: #3157ff;
            --fluid-ease: cubic-bezier(.19, 1, .22, 1);
            --bg: transparent;
            --sidebar-bg: #12161d;
            --stage-bg: transparent;
            --border: rgba(16, 20, 26, .12);
            --stage-border: rgba(16, 20, 26, .12);
            --text: #14171d;
            --muted: #6f7a88;
            --nav-hover-bg: rgba(255, 255, 255, .07);
            --monitor-bg: rgba(14, 17, 22, .76);
            --monitor-border: rgba(255, 255, 255, .12);
            --monitor-shadow: rgba(0, 0, 0, .22);
            --divider: rgba(255, 255, 255, .16);
            --scrollbar: #c8cfd8;
            --scrollbar-hover: #aeb7c3;
            --author-name: #14171d;
            --social-icon: #aeb7c3;
        }

        body.theme-dark {
            --bg: transparent;
            --sidebar-bg: #0f141d;
            --stage-bg: transparent;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --monitor-bg: rgba(23, 29, 41, 0.82);
            --monitor-border: rgba(255, 255, 255, 0.08);
            --monitor-shadow: rgba(0, 0, 0, 0.3);
            --divider: rgba(255, 255, 255, 0.15);
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
            --author-name: #e5e9f0;
            --social-icon: #64748b;
        }

        /* 极简滚动条 */
        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 5px !important;
            background-clip: padding-box !important;
            border-radius: 10px !important;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: transparent;
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            height: 100dvh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100dvh;
            background: transparent;
            position: relative;
            transition: background 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            display: none !important;
            width: 80px;
            min-width: 80px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            justify-content: center;
            padding: 0;
            transition: width 0.5s var(--fluid-ease) 0.5s, background 0.3s, border-color 0.3s;
            z-index: 50;
            position: relative;
        }

        .sidebar nav {
            width: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .sidebar:hover {
            width: 220px;
            transition-delay: 0s;
        }

        .logo-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--text);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.6s var(--fluid-ease) 0.5s, border-color 0.3s;
        }

        .sidebar:hover .logo-ring {
            transform: rotate(90deg);
            border-radius: 50%;
            transition-delay: 0s;
        }

        /* 导航项 */
        .nav-item {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s var(--fluid-ease) 0.5s;
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
            outline: none;
        }

        .sidebar:hover .nav-item {
            width: 190px;
            transition-delay: 0s;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .nav-item:focus-visible,
        .theme-toggle:focus-visible {
            box-shadow: 0 0 0 3px rgba(49, 87, 255, .28);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        body.theme-dark .nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-text {
            opacity: 0;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s 0.5s;
        }

        .sidebar:hover .nav-text {
            opacity: 1;
            transition-delay: 0.1s;
        }

        /* 主舞台区 */
        .stage {
            flex: 1;
            background: transparent;
            margin: 0;
            border-radius: 0;
            overflow: hidden;
            border: none;
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        html, body, .app-shell, .stage, iframe, #frame-klein {
            border-radius: 0 !important;
            clip-path: none !important;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        #frame-gpt-chat {
            position: absolute;
            inset: 0 0 0 auto;
            width: min(400px, 100vw);
            height: 100%;
            z-index: 20;
            opacity: 0;
            filter: none;
            transform: translateX(18px);
            background: transparent;
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        #frame-gpt-chat.active {
            opacity: 1;
            transform: translateX(0);
            filter: none;
            pointer-events: auto;
        }

        .chat-reopen-btn {
            position: absolute;
            right: 16px;
            top: 18px;
            z-index: 120;
            display: none;
            height: 32px;
            min-width: 60px;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 0 10px;
            color: #27272a;
            font: 400 13px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: rgba(245, 245, 245, .92);
            border: 0;
            border-radius: 10px;
            box-shadow: none;
            cursor: pointer;
            transition: background .15s var(--fluid-ease), opacity .15s var(--fluid-ease);
            backdrop-filter: blur(16px);
        }

        .chat-reopen-btn:hover,
        .chat-reopen-btn:active {
            background: rgba(232, 232, 232, .96);
        }

        .chat-reopen-btn.is-visible {
            display: inline-flex;
        }

        .chat-reopen-btn-icon {
            display: inline-flex;
            width: 16px;
            height: 16px;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
            padding-right: 2px;
        }

        .chat-reopen-btn-icon svg {
            width: 16px;
            height: 16px;
            color: currentColor;
        }

        .chat-reopen-btn-label {
            padding: 0 4px;
            white-space: nowrap;
        }

        #frame-klein.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 右下角监视器 */
        .nano-monitor {
            position: absolute;
            top: 18px;
            right: calc(min(400px, 100vw) + 22px);
            z-index: 110;
            display: flex;
            align-items: center;
            gap: 8px;
            /* 与画布左下角控件同款：浅灰半透明、无边框无阴影 */
            background: color-mix(in srgb, rgb(245, 245, 245) 90%, transparent);
            color: #343432;
            backdrop-filter: blur(16px);
            height: 40px;
            padding: 6px 12px;
            border-radius: 14px;
            border: 0;
            box-shadow: none;
            font-family: monospace;
            transition: all 0.4s var(--fluid-ease);
        }

        .stage.chat-collapsed .nano-monitor {
            right: 110px;
            top: 14px;
        }

        .nano-monitor.is-busy {
            background: color-mix(in srgb, rgb(245, 245, 245) 90%, transparent);
            color: #343432;
            border: 0;
            box-shadow: none;
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            color: #343432;
        }

        .nano-monitor.is-busy .stat-group {
            color: #343432;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(0, 0, 0, 0.12);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: .01ms !important;
            }

            iframe {
                filter: none !important;
                transform: none !important;
            }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s var(--fluid-ease);
            margin: 8px 0;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .theme-toggle svg { width: 16px; height: 16px; }

        .theme-dock {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* The workspace now has two top-level destinations; image tools live inside Cowart. */
        .sidebar nav > .nav-item { display: none; }
        .sidebar nav > .nav-item:nth-child(1),
        .sidebar nav > .nav-item:nth-child(4) { display: flex; }
        .sidebar nav > div:not(.nav-item) { display: none; }

        .sidebar:hover .theme-toggle {
            /* Expand to match nav item width */
        }
    </style>

    <style id="inline-gpt-chat-style">

        
        :root { --ease:cubic-bezier(.4,0,.2,1); --panel-width:400px; --lo-text:#27272a; --lo-muted:#8f9399; --lo-line:#e8e8e8; --lo-soft:#f6f6f6; }

        #frame-gpt-chat button { cursor:pointer; }
        .chat-shell { width:min(var(--panel-width),100vw); height:100vh; margin-left:auto; display:flex; flex-direction:column; min-width:0; background:#fff; border-left:1px solid #e5e5e5; box-shadow:-10px 0 28px rgba(0,0,0,.04); position:relative; }

        .title-block p { display:none; }
        .top-actions { display:flex; align-items:center; gap:8px; position:relative; margin-left:auto; }
        .action-btn, .icon-btn { width:24px; height:24px; padding:0; border:0; border-radius:6px; display:flex; align-items:center; justify-content:center; background:transparent; color:#8a8f98; transition:all .16s var(--ease); }
        .action-btn span { display:none; }
        .action-btn:hover, .icon-btn:hover { background:#f2f3f4; color:#202124; }
        .history-popover { position:absolute; top:34px; right:0; width:min(376px,calc(100vw - 16px)); max-height:520px; overflow:hidden; background:#fff; border:1px solid #e1e4e8; border-radius:12px; box-shadow:0 8px 26px rgba(0,0,0,.10); padding:12px; display:none; z-index:30; }
        .model-prefs-popover { position:absolute; right:22px; bottom:84px; width:400px; height:auto; max-width:calc(100vw - 44px); max-height:calc(100vh - 120px); overflow:hidden; background:#fff; border:.5px solid #e3e3e3; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.15); padding:4px; display:none; z-index:130; box-sizing:border-box; backdrop-filter:blur(16px); }
        .history-popover.open { display:block; animation:popIn .18s var(--ease); }
        .model-prefs-popover.open { display:block; animation:popIn .18s var(--ease); }
        .popover-title { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:2px 2px 12px; }
        .popover-title strong { font-size:16px; font-weight:600; color:#1f2329; }
        .popover-search { height:32px; margin:0 2px 12px; border:1px solid #e5e7eb; border-radius:8px; display:flex; align-items:center; gap:8px; padding:0 12px; color:#b8bcc3; background:#fff; }
        .popover-search input { width:100%; height:100%; border:0 !important; outline:0 !important; box-shadow:none !important; background:transparent !important; color:#34373d; font-size:12px; appearance:none; -webkit-appearance:none; }
        .popover-search input::-webkit-search-decoration,

        .popover-search input::placeholder { color:#c5c8cd; }
        .top-separator { width:1px; height:18px; background:#e5e7eb; margin-left:2px; }
        .history-new { width:100%; height:32px; display:flex; align-items:center; justify-content:space-between; padding:0 8px; border-radius:8px; color:#4b5563; font-size:13px; font-weight:500; margin-bottom:6px; }
        .history-new:hover { background:#f6f6f6; color:#111; }
        .thread-list { max-height:430px; overflow:auto; display:flex; flex-direction:column; gap:6px; padding-right:2px; }
        .thread-item { display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%; background:#f4f4f5; border:0; border-radius:14px; padding:11px 14px; text-align:left; min-width:0; cursor:pointer; }

    <script id="inline-gpt-chat-script">

        lucide.createIcons();
        function uuid(){
            if(crypto?.randomUUID) return crypto.randomUUID();
            return 'u-' + Math.random().toString(16).slice(2) + Date.now();
        }

        const USER_KEY = 'gpt_chat_browser_user';
        const userId = localStorage.getItem(USER_KEY) || uuid();
        localStorage.setItem(USER_KEY, userId);

        let conversations = [];
        let currentConversation = null;
        let mode = 'chat';
        let provider = 'chat';
        let msModel = '';
        let chatRatio = 'square';
        let chatResolution = '1k';
        let refs = [];
        let selectedChatProvider = '';
        let selectedChatModel = '';
        let historyQuery = '';
        let thinkingEnabled = false;
        const CHAT_PAGE_TITLE = '新对话';
        const DEFAULT_CHAT_TITLE = 'New Chat';
        let config = { chat_model: 'local-model', image_model: 'gpt-image-1', chat_api_endpoints: [], ms_chat_models: [] };

        function setChatHeading(){
            document.getElementById('chatTitle').textContent = '';
        }

        function chatDisplayTitle(title){
            return title === '新对话' ? DEFAULT_CHAT_TITLE : (title || DEFAULT_CHAT_TITLE);
        }

        function endpointDisplayName(name){
            if(name === '默认对话 API') return 'Default Chat API';
            return name || 'LMM';
        }

        const SIZE_OPTIONS = {
            square: [['1024x1024','1k'], ['1536x1536','2k']],
            portrait: [['720x1080','1k'], ['1024x1536','2k']],
            landscape: [['1080x720','1k'], ['1536x1024','2k']],
            story: [['720x1280','1k'], ['1080x1920','2k']],
            wide: [['1280x720','1k'], ['1920x1080','2k']]
        };

        const headers = () => ({'Content-Type':'application/json', 'X-User-ID':userId});

        async function loadConfig(){
            try {
                const data = await fetch('/api/config').then(r=>r.json());
                config = { ...config, ...data };
                if(!config.chat_api_endpoints?.length){
                    config.chat_api_endpoints = [{
                        id:'default',
                        name:'Default Chat API',
                        models: config.chat_models || [config.chat_model || 'local-model'],
                        default_model: config.chat_model || 'local-model'
                    }];
                }
                const firstEndpoint = config.chat_api_endpoints[0] || {};
                selectedChatProvider = selectedChatProvider || firstEndpoint.id || 'default';
                selectedChatModel = selectedChatModel || firstEndpoint.default_model || (firstEndpoint.models || [])[0] || config.chat_model || 'local-model';
                config.chat_model = selectedChatModel;
                renderModelSelect();
                renderModelPreferences();
                updateModelLabel();
            } catch(e) {}
        }

        function setProvider(p) {
            provider = p;
            updateModelLabel();
        }

        async function loadConversations(){
            const data = await fetch('/api/conversations', {headers:{'X-User-ID':userId}}).then(r=>r.json());
            conversations = data.conversations || [];
            renderThreads();
            if(!currentConversation && conversations[0]) await openConversation(conversations[0].id);
            if(!currentConversation) renderMessages([]);
        }

        function renderThreads(){
            const list = document.getElementById('threadList');
            list.innerHTML = '';
            const normalizedQuery = historyQuery.trim().toLowerCase();
            const visibleConversations = normalizedQuery
                ? conversations.filter(item => `${chatDisplayTitle(item.title)} ${item.last_message || ''}`.toLowerCase().includes(normalizedQuery))
                : conversations;
            if(!visibleConversations.length){
                list.innerHTML = '<div class="px-3 py-8 text-center text-[11px] font-bold text-gray-300 uppercase tracking-widest">No History</div>';
                return;
            }
            visibleConversations.forEach(item => {
                const box = document.createElement('div');
                box.className = `thread-item ${currentConversation?.id === item.id ? 'active' : ''}`;
                box.onclick = () => openConversation(item.id, true);
                const raw = chatDisplayTitle(item.title);
                const label = raw === DEFAULT_CHAT_TITLE ? raw : Array.from(raw).slice(0, 6).join('');
                const title = document.createElement('span');
                title.className = 'thread-title';
                title.textContent = label;
                const del = document.createElement('button');
                del.className = 'thread-delete';
                del.title = '删除';
                del.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
                del.onclick = (event) => {
                    event.stopPropagation();
                    if(del.dataset.confirm === '1'){
                        clearTimeout(del._t);
                        deleteConversation(item.id);
                        return;
                    }
                    del.dataset.confirm = '1';
                    del.classList.add('confirming');
                    del.title = '再次点击确认删除';
                    del.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>';
                    lucide.createIcons();
                    clearTimeout(del._t);
                    del._t = setTimeout(() => {
                        del.dataset.confirm = '';
                        del.classList.remove('confirming');
                        del.title = '删除';
                        del.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
                        lucide.createIcons();
                    }, 3000);
                };
                box.appendChild(title);
                box.appendChild(del);
                list.appendChild(box);
            });
            lucide.createIcons();
        }

        async function newConversation(){
            const data = await fetch('/api/conversations', {method:'POST', headers:headers(), body:JSON.stringify({title:DEFAULT_CHAT_TITLE})}).then(r=>r.json());
            currentConversation = data.conversation;
            setChatHeading();
            await loadConversations();
            renderMessages([]);
            toggleHistory(false);
        }

        async function openConversation(id, closePanel=false){
            const data = await fetch(`/api/conversations/${id}`, {headers:{'X-User-ID':userId}}).then(r=>r.json());
            currentConversation = data.conversation;
            setChatHeading();
            renderThreads();
            renderMessages(currentConversation.messages || []);
            if(closePanel) toggleHistory(false);
        }

        async function deleteConversation(id){
            await fetch(`/api/conversations/${id}`, {method:'DELETE', headers:{'X-User-ID':userId}});
            const deletedCurrent = currentConversation?.id === id;
            if(deletedCurrent){ currentConversation = null; setChatHeading(); renderMessages([]); }
            await loadConversations();
            if(deletedCurrent && conversations[0]) await openConversation(conversations[0].id);
        }

        function toggleHistory(force){
            const pop = document.getElementById('historyPopover');
            const shouldOpen = typeof force === 'boolean' ? force : !pop.classList.contains('open');
            pop.classList.toggle('open', shouldOpen);
            const icon = document.getElementById('historyChevron');
            if(icon) icon.setAttribute('data-lucide', shouldOpen ? 'chevron-up' : 'chevron-down');
            if(shouldOpen) toggleModelPrefs(false);
            if(shouldOpen) lucide.createIcons();
        }

        function setHistoryQuery(value){
            historyQuery = value || '';
            renderThreads();
        }

        document.addEventListener('click', (event) => {
            const actions = document.querySelector('.top-actions');
            const composer = document.querySelector('.composer-inside-foot');
            if(actions && !actions.contains(event.target) && (!composer || !composer.contains(event.target))){
                toggleHistory(false);
                toggleModelPrefs(false);
            }
        });

        function bindInteractions(){
            const bind = (id, handler) => {
                const node = document.getElementById(id);
                if(!node || node.dataset.bound === 'true') return;
                node.dataset.bound = 'true';
                node.onclick = null;
                node.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    handler(event);
                });
            };
            bind('newChatBtn', newConversation);
            bind('historyToggleBtn', () => toggleHistory());
            bind('collapseBtn', collapseChatPanel);
            bind('historyCloseBtn', () => toggleHistory(false));
            bind('historyNewBtn', newConversation);
            bind('modelPrefsBtn', () => toggleModelPrefs());
        }

        function collapseChatPanel(){
            setChatPanelOpen(false);
        }

        function toggleModelPrefs(force){
            const pop = document.getElementById('modelPrefsPopover');
            if(!pop) return;
            const shouldOpen = typeof force === 'boolean' ? force : !pop.classList.contains('open');
            pop.classList.toggle('open', shouldOpen);
            if(shouldOpen){
                toggleHistory(false);
                renderModelPreferences();
                lucide.createIcons();
            }
        }

        function renderModelPreferences(){
            const list = document.getElementById('modelPrefList');
            if(!list) return;
            const rows = modelPreferenceRows();
            if(!rows.length){
                list.innerHTML = `<div class="px-1 py-10 text-center text-gray-400 text-sm">暂无可用模型</div>`;
                return;
            }
            list.innerHTML = rows.map(row => {
                const active = row.endpointId === selectedChatProvider && row.model === selectedChatModel;
                const handler = `selectModelPreference('${encodeForHandler(row.endpointId || '')}','${encodeForHandler(row.model || '')}')`;
                return `<button type="button" class="model-row ${active ? 'active' : ''}" onclick="${handler}">
                        <span class="model-row-title">${escapeHtml(row.title)}</span>
                        <span class="model-check"><i data-lucide="check" class="w-3 h-3"></i></span>
                    </button>`;
            }).join('');
            lucide.createIcons();
        }

        function modelPreferenceRows(){
            const endpoints = config.chat_api_endpoints || [];
            const chatRows = endpoints.flatMap(endpoint => {
                const models = endpoint.models?.length ? endpoint.models : [endpoint.default_model || config.chat_model || 'local-model'];
                return models.map(model => ({
                    kind:'chat',
                    endpointId:endpoint.id || '',
                    model,
                    title:model,
                    description:endpointDisplayName(endpoint.name || 'LMM API'),
                    badge:'30s'
                }));
            });
            if(chatRows.length) return chatRows;
            const fallbackModels = config.chat_models?.length ? config.chat_models : [config.chat_model].filter(Boolean);
            return fallbackModels.map(model => ({
                kind:'chat',
                endpointId:selectedChatProvider || '',
                model,
                title:model,
                description:'Default Chat API',
                badge:'30s'
            }));
        }

        function selectModelPreference(endpointId, model){
            selectedChatProvider = decodeURIComponent(endpointId || '');
            selectedChatModel = decodeURIComponent(model || '');
            config.chat_model = selectedChatModel;
            renderModelSelect();
            renderModelPreferences();
            updateModelLabel();
        }

        function setMode(next){
            mode = next;
            document.getElementById('imageControls').classList.toggle('hidden', next !== 'image');
            updateModelLabel();
        }

        function updateModelLabel(){
            let label = '';
            if (mode === 'image') {
                label = config.image_model || 'Image';
            } else {
                const endpoint = currentChatEndpoint();
                label = `${endpointDisplayName(endpoint?.name)} / ${selectedChatModel || config.chat_model || 'Chat'}`;
            }
            document.getElementById('modelLabel').textContent = label;
        }

        function currentChatEndpoint(){
            return (config.chat_api_endpoints || []).find(item => item.id === selectedChatProvider) || (config.chat_api_endpoints || [])[0] || null;
        }

        function modelValue(endpointId, model){
            return `${encodeURIComponent(endpointId || '')}::${encodeURIComponent(model || '')}`;

        function renderModelSelect(){
            const select = document.getElementById('modelSelect');
            if(!select) return;
            const endpoints = config.chat_api_endpoints || [];
            select.innerHTML = endpoints.map(endpoint => {
                const models = endpoint.models?.length ? endpoint.models : [endpoint.default_model || config.chat_model || 'local-model'];
                const options = models.map(model => `<option value="${modelValue(endpoint.id, model)}">${escapeHtml(model)}</option>`).join('');

        function setSelectedModel(value, refreshLabel = true){
            const [providerId, model] = String(value || '').split('::');
            selectedChatProvider = decodeURIComponent(providerId || '');
            selectedChatModel = decodeURIComponent(model || '');
            config.chat_model = selectedChatModel;
            if(refreshLabel) updateModelLabel();
            renderModelPreferences();

        function setChatRatio(next, preferredSize = ''){
            chatRatio = next;
            ['square','portrait','landscape','story','wide'].forEach(item => {
                document.getElementById(`chat-ratio-${item}`).classList.toggle('active', item === next);
            });
            if(preferredSize){ const match = SIZE_OPTIONS[next].find(([value]) => value === preferredSize); if(match) chatResolution = match[1]; }
            updateChatResolutionUI();
        }

        function setChatResolution(next){ chatResolution = next; updateChatResolutionUI(); }
        function updateChatResolutionUI(){
            document.getElementById('chat-res-1k').classList.toggle('active', chatResolution === '1k');
            document.getElementById('chat-res-2k').classList.toggle('active', chatResolution === '2k');
        }

        function currentChatSize(){
            const options = SIZE_OPTIONS[chatRatio] || SIZE_OPTIONS.square;
            const match = options.find(([, label]) => label === chatResolution) || options[0];

        function renderMessages(messages){
            const box = document.getElementById('messages');
            box.innerHTML = '';
            lastRenderedDay = null;
            if(!messages.length){
                box.innerHTML = `<div class="m-auto text-center opacity-20"><i data-lucide="messages-square" class="w-14 h-14 mx-auto stroke-[1px]"></i><div class="text-[10px] font-black tracking-[0.5em] uppercase mt-4">READY</div></div>`;
                lucide.createIcons();
                return;
            }
            messages.forEach(addMessageBubble);
            scrollBottom();
        }

        let lastRenderedDay = null;
        function formatChatDate(ts){
            const d = new Date(ts || Date.now());
            if(isNaN(d.getTime())) return '';
            return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
        }
        function formatChatTime(ts){
            const d = new Date(ts || Date.now());
            if(isNaN(d.getTime())) return '';
            return d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false});
        }
        function chatDayKey(ts){
            const d = new Date(ts || Date.now());
            if(isNaN(d.getTime())) return '';
            return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        }

        function addMessageBubble(msg){
            const box = document.getElementById('messages');
            const isUser = msg.role === 'user';
            const item = document.createElement('div');
            item.className = `msg-item ${isUser ? 'user' : 'assistant'}`;
            const ts = msg.created_at || Date.now();
            const dayKey = chatDayKey(ts);
            const firstOfDay = dayKey && dayKey !== lastRenderedDay;
            if(dayKey) lastRenderedDay = dayKey;
            const stamp = document.createElement('div');
            stamp.className = `chat-stamp ${firstOfDay ? 'is-date' : 'is-time'}`;
            stamp.textContent = firstOfDay ? formatChatDate(ts) : formatChatTime(ts);
            stamp.title = `${formatChatDate(ts)} ${formatChatTime(ts)}`;
            item.appendChild(stamp);
            const row = document.createElement('div');
            row.className = `bubble-row ${isUser ? 'user' : 'assistant'}`;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isUser ? 'user' : 'assistant'}`;
            let reasoning = null;
            if(!isUser && msg.reasoning){
                reasoning = document.createElement('div');
                reasoning.className = 'reasoning-box';
                const title = document.createElement('div');
                title.className = 'reasoning-title';
                title.textContent = 'Reasoning';
                const body = document.createElement('div');
                body.className = 'reasoning-text';
                body.textContent = msg.reasoning || '';
                reasoning.appendChild(title);
                reasoning.appendChild(body);
                bubble.appendChild(reasoning);
            }
            const text = document.createElement('div');
            text.textContent = msg.type === 'image' ? 'Image ready' : (msg.content || '');
            text.className = 'bubble-text';
            bubble.appendChild(text);
            if(msg.attachments?.length){
                const thumbs = document.createElement('div');
                thumbs.className = 'thumbs';
                msg.attachments.forEach(ref => thumbs.insertAdjacentHTML('beforeend', `<img class="thumb" src="${ref.url}">`));
                bubble.appendChild(thumbs);
            }
            if(msg.image_url){
                const img = document.createElement('img');
                img.className = 'generated';
                img.src = msg.image_url;
                img.onclick = () => window.open(msg.image_url, '_blank');
                bubble.appendChild(img);
            }
            row.appendChild(bubble);
            item.appendChild(row);
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            const copyBtn = document.createElement('button');
            copyBtn.className = 'msg-copy';
            copyBtn.title = '复制';
            copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 14 14"><path fill="currentColor" fill-rule="evenodd" d="M2.128 4.142c-.934 0-1.692.757-1.692 1.691v5.834c0 .934.758 1.692 1.692 1.692h5.834c.934 0 1.692-.758 1.692-1.692V5.834c0-.935-.758-1.692-1.692-1.692zm5.834 1.05c.354 0 .641.287.641.641v5.834a.64.64 0 0 1-.641.641H2.128a.64.64 0 0 1-.641-.641V5.834c0-.355.287-.642.641-.642z" clip-rule="evenodd"/><path fill="currentColor" d="M5.628.642c-.931 0-1.692.76-1.692 1.692a.525.525 0 0 0 1.05 0c0-.352.29-.642.642-.642h5.834c.351 0 .641.29.641.642v5.833c0 .352-.29.641-.641.641a.525.525 0 0 0-.054 1.048l.054.003.086-.003a1.696 1.696 0 0 0 1.606-1.69V2.334c0-.931-.76-1.691-1.692-1.691z"/></svg>`;
            copyBtn.onclick = (e) => { e.stopPropagation(); navigator.clipboard?.writeText(text.textContent || ''); };
            actions.appendChild(copyBtn);
            item.appendChild(actions);
            box.appendChild(item);
            return {row, bubble, text, reasoning};
        }

        async function uploadFiles(files){
            if(!files?.length) return;
            const form = new FormData();
            [...files].forEach(file => form.append('files', file));
            const data = await fetch('/api/ai/upload', {method:'POST', body:form}).then(r=>r.json());
            refs.push(...(data.files || []));
            renderRefs();
        }

        function renderRefs(){
            const strip = document.getElementById('refStrip');
            strip.innerHTML = refs.map((ref,i) => {

                return `<span class="ref-decorator" data-lexical-decorator="true" contenteditable="false">
                    <span class="ref-mention" trigger="@" value="${value}" data-beautiful-mention="@${value}" data-testid="agent-mention-capsule-uploaded" data-state="closed">
                        <span class="ref-chip">
                            <span class="ref-chip-thumb" data-mention-type="image"><img class="h-full w-full object-cover" draggable="false" src="${url}" alt=""></span>
                            <span class="ref-chip-label">${label}</span>
                            <button type="button" onclick="removeRef(${i})" aria-label="移除参考图">×</button>
                            <span class="ref-hover-preview justify-start font-inter text-xs font-normal text-white">
                                <span class="ref-hover-preview-inner overflow-hidden rounded-lg">
                                    <img alt="${label}" class="max-h-[184px] max-w-[184px] object-contain" draggable="false" src="${url}">
                                </span>
                            </span>
                        </span>
                    </span>
                </span>`;
            }).join('');
        }

        function removeRef(i){ refs.splice(i,1); renderRefs(); }

        document.getElementById('localFileInput').addEventListener('change', async (event) => {
            await uploadFiles(event.target.files);
            event.target.value = '';
        });

        function openAssetForChat(){
            AssetPicker.open(item => {
                refs.push({url:item.url || item.remote_url, name:item.name || 'asset'});
                renderRefs();
            });
        }

        function addReferenceToDialog(ref){
            const url = ref?.url || ref?.remote_url;
            if(!url) return;
            const next = {
                url,
                name: ref.name || ref.label || '请根据下面的',
                shapeId: ref.shapeId || '',
                source: ref.source || 'cowart'
            };
            const key = next.shapeId || next.url;
            refs = refs.filter(item => (item.shapeId || item.url) !== key);
            refs.push(next);
            renderRefs();
            const input = document.getElementById('messageInput');
            input?.focus();
        }

        window.addEventListener('message', event => {
            if(event.data?.type === 'cowart:add-reference-to-dialog'){
                addReferenceToDialog(event.data);
            }
        });

        window.addEventListener('paste', e => {
            const files = [...(e.clipboardData?.items || [])].filter(x => x.kind === 'file' && x.type.startsWith('image/')).map(x => x.getAsFile());
            if(files.length) uploadFiles(files);
        });

        const composerBody = document.getElementById('composerBody');
        composerBody.addEventListener('dragover', e => {
            if(!hasImageFiles(e.dataTransfer?.items)) return;
            e.preventDefault();
            composerBody.classList.add('drag-over');
        });
        composerBody.addEventListener('dragleave', e => {
            if(!composerBody.contains(e.relatedTarget)) composerBody.classList.remove('drag-over');
        });
        composerBody.addEventListener('drop', e => {
            if(!hasImageFiles(e.dataTransfer?.items)) return;
            e.preventDefault();
            composerBody.classList.remove('drag-over');
            const files = [...(e.dataTransfer?.files || [])].filter(file => file.type.startsWith('image/'));
            uploadFiles(files);
        });

        function hasImageFiles(items){ return [...(items || [])].some(item => item.kind === 'file' && item.type.startsWith('image/')); }
        function autoGrow(el){ el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
        function handleKey(e){ if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }

        async function sendMessage(){
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if(!message) return;
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            const pendingRefs = refs.slice();
            refs = [];
            renderRefs();
            input.value = '';
            autoGrow(input);
            if(!currentConversation){
                currentConversation = {id:'', title:DEFAULT_CHAT_TITLE, messages:[]};
                document.getElementById('messages').innerHTML = '';
                lastRenderedDay = null;
            }
            addMessageBubble({role:'user', content:message, attachments:pendingRefs});
            const assistantBubble = addMessageBubble({role:'assistant', content: mode === 'image' ? 'Generating image...' : ''});
            if(mode === 'chat') assistantBubble.bubble.classList.add('streaming');
            scrollBottom();
            try {
                if(mode === 'chat') {
                    await streamChatMessage(message, pendingRefs, assistantBubble);
                } else {
                    const data = await fetch('/api/chat', {
                        method:'POST',
                        headers:headers(),
                        body:JSON.stringify({
                            conversation_id: currentConversation.id || '',
                            message,
                            mode,
                            size: currentChatSize(),
                            model: config.chat_model,
                            image_model: config.image_model,
                            reference_images: pendingRefs,
                            provider: 'comfly',
                        })
                    }).then(async r => { if(!r.ok) throw new Error((await r.json()).detail || 'Request failed'); return r.json(); });
                    currentConversation = data.conversation;
                    setChatHeading();
                    renderMessages(currentConversation.messages || []);
                    await loadConversations();
                }
            } catch(err) {
                renderMessages([...(currentConversation.messages || []), {role:'assistant', content:err.message || 'Request failed'}]);
            } finally {
                btn.disabled = false;
                scrollBottom();
            }
        }

        async function streamChatMessage(message, pendingRefs, assistantBubble){
            const currentProvider = provider;
            const currentMsModel = msModel || (config.ms_chat_models?.[0] || '');
            const currentChatModel = selectedChatModel || config.chat_model;

            const res = await fetch('/api/chat/stream', {
                method:'POST',
                headers:headers(),
                body:JSON.stringify({
                    conversation_id: currentConversation.id || '',
                    message,
                    mode:'chat',
                    model: currentProvider === 'modelscope' ? currentMsModel : currentChatModel,
                    ms_model: currentProvider === 'modelscope' ? currentMsModel : '',
                    provider: 'chat',
                    chat_provider: selectedChatProvider,
                    reasoning_enabled: thinkingEnabled,
                    reference_images: pendingRefs
                })
            });
            if(!res.ok) throw new Error((await res.json()).detail || 'Request failed');
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullText = '';
            let reasoningText = '';
            while(true){
                const {value, done} = await reader.read();
                if(done) break;
                buffer += decoder.decode(value, {stream:true});
                const events = buffer.split('\n\n');
                buffer = events.pop() || '';
                for(const eventText of events){
                    const line = eventText.split('\n').find(item => item.startsWith('data:'));
                    if(!line) continue;
                    const event = JSON.parse(line.slice(5).trim());
                    if(event.type === 'meta'){
                        currentConversation = event.conversation;
                        setChatHeading();
                    }
                    if(event.type === 'delta'){
                        fullText += event.delta || '';
                        assistantBubble.text.textContent = fullText;
                        scrollBottom();
                    }
                    if(event.type === 'reasoning_delta'){
                        reasoningText += event.delta || '';
                        if(!assistantBubble.reasoning){
                            assistantBubble.reasoning = document.createElement('div');
                            assistantBubble.reasoning.className = 'reasoning-box';
                            assistantBubble.reasoning.innerHTML = '<div class="reasoning-title">Reasoning</div><div class="reasoning-text"></div>';
                            assistantBubble.bubble.insertBefore(assistantBubble.reasoning, assistantBubble.text);
                        }
                        assistantBubble.reasoning.querySelector('.reasoning-text').textContent = reasoningText;
                        scrollBottom();
                    }
                    if(event.type === 'error') throw new Error(event.detail || 'Request failed');
                    if(event.type === 'done'){
                        assistantBubble.bubble.classList.remove('streaming');
                        currentConversation = event.conversation;
                        setChatHeading();
                        renderMessages(currentConversation.messages || []);
                        await loadConversations();
                    }
                }
            }
            assistantBubble.bubble.classList.remove('streaming');
        }

        function scrollBottom(){ requestAnimationFrame(() => { const box = document.getElementById('messages'); box.scrollTop = box.scrollHeight; }); }
        function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
        function encodeForHandler(str){ return encodeURIComponent(str || '').replace(/'/g, '%27'); }

        window.addEventListener('DOMContentLoaded', async () => {
            setChatHeading();
            bindInteractions();
            setChatRatio('square');
            setChatResolution('1k');
            await loadConfig();
            await loadConversations();
            bindInteractions();
        });

    </script>

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        function getStoredValue(key) {
            try { return window.localStorage ? window.localStorage.getItem(key) : null; }
            catch (e) { return null; }
        }

        function setStoredValue(key, value) {
            try { if (window.localStorage) window.localStorage.setItem(key, value); }
            catch (e) { }
        }

        const CID = getStoredValue("client_id") || generateUUID();
        setStoredValue("client_id", CID);

        const ACTIVE_UI_KEY = 'infinite_canvas_active_ui';

        function ensureFrameLoaded(frame) {
            if (!frame) return;
            const desiredSrc = frame.dataset.src;
            if (desiredSrc) {
                const desiredUrl = new URL(desiredSrc, window.location.href).href;
                if (!frame.src || frame.src !== desiredUrl) frame.src = desiredSrc;
            }
            if (frame.id === 'frame-klein' && frame.dataset.chatInsetBound !== 'true') {
                frame.dataset.chatInsetBound = 'true';
                frame.addEventListener('load', () => syncCowartChatInset());
            }
            syncThemeToFrame(frame);
        }

        function activateUI(id, el = null, persist = true) {
            const navItem = el || [...document.querySelectorAll('.nav-item')].find(item => (item.getAttribute('onclick') || '').includes(`'${id}'`));
            const target = document.getElementById('frame-' + id);
            if(!target) return;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(navItem) navItem.classList.add('active');
            document.querySelectorAll('iframe, #frame-gpt-chat').forEach(f => f.classList.remove('active'));

            if(id === 'gpt-chat'){
                const canvasFrame = document.getElementById('frame-klein');
                canvasFrame?.classList.add('active');
                setChatPanelOpen(true);
                ensureFrameLoaded(canvasFrame);
                if(persist) setStoredValue(ACTIVE_UI_KEY, 'gpt-chat');
                return;
            }

            target.classList.add('active');
            ensureFrameLoaded(target);
            if(persist) setStoredValue(ACTIVE_UI_KEY, id);
        }

        function switchUI(el, id) {
            activateUI(id, el, true);
        }

        function setChatPanelOpen(open) {
            const stage = document.querySelector('.stage');
            const chatPanel = document.getElementById('frame-gpt-chat');
            const reopenButton = document.getElementById('chatReopenBtn');
            chatPanel?.classList.toggle('active', open);
            reopenButton?.classList.toggle('is-visible', !open);
            stage?.classList.toggle('chat-collapsed', !open);
            syncCowartChatInset(open);
        }

        function syncCowartChatInset(open = document.getElementById('frame-gpt-chat')?.classList.contains('active')) {
            const frame = document.getElementById('frame-klein');
            const width = open && window.innerWidth > 520 ? Math.min(400, window.innerWidth) : 0;
            frame?.contentWindow?.postMessage({type:'cowart:set-chat-panel-width', width}, '*');
        }

        function reopenChatPanel() {
            document.getElementById('frame-klein')?.classList.add('active');
            setChatPanelOpen(true);
            setStoredValue(ACTIVE_UI_KEY, 'gpt-chat');
        }

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor.classList.add('is-busy');
                    queueVal.innerText = `${pos}/${total}`;
                } else {
                    monitor.classList.remove('is-busy');
                    queueVal.innerText = total > 0 ? total : '0';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    document.getElementById('online-val').innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 夜间模式 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function broadcastTheme(theme) {
            if (window.StudioTheme) {
                window.StudioTheme.set(theme);
            }
            document.querySelectorAll('iframe').forEach(f => syncThemeToFrame(f));
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const moon = document.getElementById('icon-moon');
            const sun = document.getElementById('icon-sun');
            if (theme === 'dark') {
                moon.style.display = 'none';
                sun.style.display = 'block';
            } else {
                moon.style.display = 'block';
                sun.style.display = 'none';
            }
        }

        function toggleTheme() {
            const current = window.StudioTheme ? window.StudioTheme.get() : 'light';
            broadcastTheme(current === 'dark' ? 'light' : 'dark');
        }

        function clearOuterChrome(){
            document.documentElement.style.setProperty('background', 'transparent', 'important');
            document.body.style.setProperty('background', 'transparent', 'important');
            document.body.style.setProperty('margin', '0', 'important');
            document.body.style.setProperty('padding', '0', 'important');
            document.querySelector('.app-shell')?.style.setProperty('background', 'transparent', 'important');
            document.querySelector('.app-shell')?.style.setProperty('padding', '0', 'important');
            document.querySelector('.stage')?.style.setProperty('background', 'transparent', 'important');
        }

        // listen for theme changes triggered by theme.js
        window.addEventListener('studio-theme-change', (e) => {
            updateThemeIcon(e.detail.theme);
            clearOuterChrome();
        });

        window.addEventListener('message', (event) => {
            if(event.data?.type === 'gpt-chat-collapse'){
                setChatPanelOpen(false);
            }
            if(event.data?.type === 'api-settings-saved'){
                loadConfig();
            }
        });
        window.addEventListener('resize', () => syncCowartChatInset());

        // init icon state on load
        window.addEventListener('DOMContentLoaded', () => {
            const theme = window.StudioTheme ? window.StudioTheme.get() : 'light';
            updateThemeIcon(theme);
            clearOuterChrome();
            activateUI('gpt-chat', null, false);
        });

        // sync theme when iframe loads
        document.querySelectorAll('iframe').forEach(f => {
            f.addEventListener('load', () => syncThemeToFrame(f));
        });
    </script>
</body>

</html>
