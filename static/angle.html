    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --accent: #111827;
            --bg: #f9fafb;
            --card: #ffffff;
            --easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 极简悬浮浅灰滚动条 (无底色/左移) --- */
        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: #d8d8d8 !important;
            border: 3px solid transparent !important;
            border-right-width: 5px !important;
            /* 增加右侧间距，使滚动条向左位移 */
            background-clip: padding-box !important;
            border-radius: 10px !important;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: #c0c0c0 !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: #d8d8d8 transparent !important;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--accent);
            -webkit-font-smoothing: antialiased;
        }

        .container-box {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 40px;
            margin-top: 50px;
        }

        /* 统一组件风格 */
        .glass-btn {
            background: #111827;
            transition: all 0.3s var(--easing);
        }

        .glass-btn:hover {
            background: #000;
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .glass-btn:active {
            transform: scale(0.98);
        }

        .upload-item {
            background: var(--card);
            border: 1px dashed #e2e8f0;
            transition: all 0.4s var(--easing);
        }

        .upload-item:hover {
            border-color: #000;
            background: #fff;
            transform: translateY(-2px);
        }

        .result-frame {
            background: #ffffff;
            border-radius: 32px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.02);
        }

        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
        }

        @media (min-width: 768px) {
            .masonry-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .masonry-item {
            aspect-ratio: 1 / 1;
            background: #fff;
            border: 1px solid #f1f5f9;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.5s var(--easing);
            position: relative;
        }

        .masonry-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .nano-input {
            background: #ffffff;
            border-radius: 16px;
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }

        .nano-input:focus {
            background: #ffffff;
            box-shadow: 0 0 0 2px #000;
            border-color: transparent;
        }

        @keyframes b-loading {
            0% {
                transform: scale(1);
                background: #000;
            }

            50% {
                transform: scale(1.15);
                background: #444;
            }

            100% {
                transform: scale(1);
                background: #000;
            }
        }

        .loading-box {
            width: 10px;
            height: 10px;
            animation: b-loading 1s infinite var(--easing);
        }

    </style>
    <link rel="stylesheet" href="/static/theme.css?v=20260706-lovart-pages-1">
</head>

    <script type="module">
        import * as THREE from 'three';

        // Initialize WebSocket Listener for Cloud Progress
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (data && data.type === 'cloud_status') {
                updateCloudProgress(data);
            }
        });

        function updateCloudProgress(data) {
            const container = document.getElementById('cloud-progress-container');
            const statusText = document.getElementById('cloud-status-text');
            const progressBar = document.getElementById('cloud-progress-bar');
            const percentText = document.getElementById('cloud-percent');

            if (!container || !statusText || !progressBar) return;

            // Show container if hidden
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
            }

            // Update UI
            if (data.status) {
                // Simplify status text (remove internal details if needed)
                let displayStatus = data.status;
                if (displayStatus.includes("PENDING")) displayStatus = "Queueing...";
                if (displayStatus.includes("RUNNING")) displayStatus = "Generating...";
                statusText.innerText = displayStatus;
            }

            if (typeof data.progress !== 'undefined' && typeof data.total !== 'undefined') {
                const percent = Math.min(100, Math.round((data.progress / data.total) * 100));
                progressBar.style.width = `${percent}%`;
                percentText.innerText = `${percent}%`;
            }
        }

        const container = document.getElementById('threeContainer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        // Camera setup
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Objects
        const geometry = new THREE.PlaneGeometry(3, 3);
        const material = new THREE.MeshStandardMaterial({
            color: 0x444444,
            side: THREE.DoubleSide
        });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
        scene.add(gridHelper);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.DirectionalLight(0xffffff, 1);
        pointLight.position.set(5, 10, 7);
        scene.add(pointLight);

        // Camera Logic
        const sliderH = document.getElementById('rotate-h');
        const sliderV = document.getElementById('rotate-v');
        const sliderD = document.getElementById('distance');
        const valH = document.getElementById('val-horizontal');
        const valV = document.getElementById('val-vertical');
        const valD = document.getElementById('val-distance');

        let lastGeneratedAnglePrompt = "";

        function buildAnglePrompt(h, v, d) {
            const parts = [];
            if (h !== 0) {
                const dir = h > 0 ? "向右" : "向左";
                parts.push(`${dir}旋转${Math.abs(h)}度`);
            }
            if (v !== 0) {
                const dir = v > 0 ? "俯视" : "仰视";
                parts.push(`${dir}${Math.abs(v)}度`);
            }
            if (parts.length === 0) {
                parts.push("保持原位");
            }
            parts.push(`距离${d.toFixed(1)}`);
            return `将相机${parts.join("，")}`;
        }

        function updateAnglePrompt(h, v, d) {
            const promptInput = document.getElementById('promptInput');
            if (!promptInput) return;
            const nextPrompt = buildAnglePrompt(h, v, d);
            if (!promptInput.value.trim() || promptInput.value === lastGeneratedAnglePrompt) {
                promptInput.value = nextPrompt;
                lastGeneratedAnglePrompt = nextPrompt;
            }
        }

        window.updateCamera = function (syncPrompt = false) {
            const lon = parseFloat(sliderH.value);
            const lat = parseFloat(sliderV.value);
            const dist = parseFloat(sliderD.value);

            // Sync inputs (avoid overwriting if active)
            if (document.activeElement !== valH) valH.value = lon;
            if (document.activeElement !== valV) valV.value = lat;
            if (document.activeElement !== valD) valD.value = dist.toFixed(1);

            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);

            camera.position.x = dist * Math.sin(phi) * Math.sin(theta);
            camera.position.y = dist * Math.cos(phi);
            camera.position.z = dist * Math.sin(phi) * Math.cos(theta);
            camera.lookAt(0, 0, 0);

            if (syncPrompt === true) {
                updateAnglePrompt(lon, lat, dist);
            }
        }

        window.syncInput = (type) => {
            if (type === 'h') {
                let v = parseFloat(valH.value);
                if (!isNaN(v)) sliderH.value = v;
            } else if (type === 'v') {
                let v = parseFloat(valV.value);
                if (!isNaN(v)) sliderV.value = v;
            } else if (type === 'd') {
                let v = parseFloat(valD.value);
                if (!isNaN(v)) sliderD.value = v;
            }
            window.updateCamera(true);
        };

        window.resetControl = (type) => {
            if (type === 'h') {
                sliderH.value = 0;
                valH.value = 0;
            } else if (type === 'v') {
                sliderV.value = 0;
                valV.value = 0;
            } else if (type === 'd') {
                sliderD.value = 4;
                valD.value = 4;
            }
            window.updateCamera(true);
        };

        sliderH.addEventListener('input', () => window.updateCamera(true));
        sliderV.addEventListener('input', () => window.updateCamera(true));
        sliderD.addEventListener('input', () => window.updateCamera(true));
        window.updateCamera(false);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        const resizeObserver = new ResizeObserver(() => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
        resizeObserver.observe(container);

        // Expose function to update texture
        window.update3DTexture = (url) => {
            new THREE.TextureLoader().load(url, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;

                // Adjust plane aspect ratio to match image
                const imageAspect = texture.image.width / texture.image.height;
                cube.scale.set(1, 1 / imageAspect, 1);
                if (imageAspect > 1) {
                    cube.scale.set(1, 1 / imageAspect, 1);
                    // Reset base scale to 3
                    cube.geometry.dispose();
                    cube.geometry = new THREE.PlaneGeometry(3, 3 / imageAspect);
                    cube.scale.set(1, 1, 1);
                } else {
                    cube.geometry.dispose();
                    cube.geometry = new THREE.PlaneGeometry(3 * imageAspect, 3);
                    cube.scale.set(1, 1, 1);
                }

                cube.material = new THREE.MeshBasicMaterial({
                    map: texture,
                    side: THREE.DoubleSide
                });
                cube.material.needsUpdate = true;

                // Show control panel (already visible, but keep logic safe)
                document.getElementById('cameraControl').classList.remove('hidden');

                // Force resize check after texture load
                setTimeout(() => {
                    const w = container.clientWidth;
                    const h = container.clientHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                }, 100);
            });
        };
    </script>

    <script>
        lucide.createIcons();
        
        let currentEngine = 'local';

        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const storage = (() => {
            try { if (window.localStorage) return window.localStorage; } catch(e) {}
            const fallback = {};
            return {getItem:k=>fallback[k]||null,setItem:(k,v)=>{fallback[k]=String(v)},removeItem:k=>{delete fallback[k]}};
        })();
        const CLIENT_ID = storage.getItem("client_id") || generateUUID();
        storage.setItem("client_id", CLIENT_ID);
        const PENDING_RESULT_KEY = 'pending_result_angle';
        const INPUT_STATE_KEY = 'angle_input_state';

        let uploadedPath = "";
        let uploadedFile = null; // Store raw file for cloud upload
        let currentResult = null;
        let allHistory = [];
        let currentIndex = 0;
        const PAGE_SIZE = 30;

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const promptInput = document.getElementById('promptInput');

        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function applyInputPreview(src) {
            if (!src) return;
            previewImg.src = src;
            previewImg.classList.remove('hidden');
            document.getElementById('uploadContent').classList.add('opacity-0');
            document.getElementById('changeOverlay').classList.replace('hidden', 'flex');
            if (window.update3DTexture) window.update3DTexture(src);
        }

        function saveInputState(extra = {}) {
            try {
                storage.setItem(INPUT_STATE_KEY, JSON.stringify({
                    uploadedPath,
                    previewSrc: previewImg.src || '',
                    prompt: promptInput.value || '',
                    engine: currentEngine,
                    rotateH: document.getElementById('rotate-h')?.value || '0',
                    rotateV: document.getElementById('rotate-v')?.value || '0',
                    distance: document.getElementById('distance')?.value || '4',
                    saved_at: Date.now(),
                    ...extra
                }));
            } catch(e) {}
        }

        function restoreInputState() {
            let state = null;
            try { state = JSON.parse(storage.getItem(INPUT_STATE_KEY) || 'null'); } catch(e) {}
            if (!state) return;
            if (Date.now() - Number(state.saved_at || 0) > 24 * 60 * 60 * 1000) {
                storage.removeItem(INPUT_STATE_KEY);
                return;
            }
            uploadedPath = state.uploadedPath || '';
            promptInput.value = state.prompt || '';
            if (document.getElementById('rotate-h')) document.getElementById('rotate-h').value = state.rotateH || '0';
            if (document.getElementById('rotate-v')) document.getElementById('rotate-v').value = state.rotateV || '0';
            if (document.getElementById('distance')) document.getElementById('distance').value = state.distance || '4';
            applyInputPreview(state.previewSrc || '');
            if (uploadedPath) {
                const btn = document.getElementById('genBtn');
                const btnText = document.getElementById('btnText');
                btn.disabled = false;
                if (btnText) btnText.innerText = "Generate New Angle";
            }
        }

        function showPendingLoading() {
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.style.backgroundColor = '#333';
            btn.innerHTML = `<i data-lucide="zap" class="w-4 h-4 text-yellow-400 fill-yellow-400 animate-pulse"></i><span class="tracking-[0.4em] text-[11px] uppercase">Processing...</span>`;
            lucide.createIcons();
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('outputImg').classList.add('hidden');
            document.getElementById('textResult').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
        }

        function resetGenerateButton(text = "Generate New Angle") {
            const btn = document.getElementById('genBtn');
            btn.style.backgroundColor = '';
            btn.innerHTML = `<i data-lucide="zap" class="w-4 h-4 text-yellow-400"></i><span id="btnText">${text}</span>`;
            btn.disabled = false;
            lucide.createIcons();
        }

        // Drag and Drop
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-black', 'bg-gray-50');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-black', 'bg-gray-50');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-black', 'bg-gray-50');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Paste support
        let isHovering = false;
        dropzone.addEventListener('mouseenter', () => isHovering = true);
        dropzone.addEventListener('mouseleave', () => isHovering = false);
        window.addEventListener('paste', (e) => {
            if (!isHovering) return;
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    handleFile(file);
                    break;
                }
            }
        });

        async function handleFile(file) {
            if (!file) return;
            uploadedFile = file; // Store for cloud usage
            const btn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');

            btn.disabled = true;
            btnText.innerText = "Uploading...";

            const reader = new FileReader();
            reader.onload = (e) => {
                applyInputPreview(e.target.result);
                saveInputState({ previewSrc: e.target.result });
            };
            reader.readAsDataURL(file);

            const formData = new FormData();
            formData.append('files', file);
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                uploadedPath = data.files[0].comfy_name;
                saveInputState();
                btn.disabled = false;
                btnText.innerText = "Generate New Angle";
            } catch (err) {
                console.error("Upload error");
                btnText.innerText = "Upload Failed";
                btn.disabled = false;
            }
        }

        async function openAssetForAngle() {
            AssetPicker.open(async (item) => {
                const btn = document.getElementById('genBtn');
                const btnText = document.getElementById('btnText');
                btn.disabled = true;
                btnText.innerText = "Uploading...";
                uploadedFile = null;
                applyInputPreview(item.url);
                saveInputState({ previewSrc: item.url });
                try {
                    const res = await fetch('/api/assets/upload-to-comfy', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({url: item.url, name: item.name || 'asset.png'})
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || '资产上传失败');
                    uploadedPath = data.comfy_name;
                    saveInputState();
                    btnText.innerText = "Generate New Angle";
                } catch (err) {
                    alert(err.message || '资产上传失败');
                    btnText.innerText = "Upload Failed";
                } finally {
                    btn.disabled = false;
                }
            });
        }

        function applyAngleToPrompt() {
            const h = parseInt(document.getElementById('rotate-h').value);
            const v = parseInt(document.getElementById('rotate-v').value);

            let parts = [];
            if (h !== 0) {
                const dir = h > 0 ? "向右" : "向左";
                parts.push(`${dir}旋转${Math.abs(h)}度`);
            }
            if (v !== 0) {
                const dir = v > 0 ? "俯视" : "仰视";
                parts.push(`${dir}${Math.abs(v)}度`);
            }

            if (parts.length === 0) {
                parts.push("保持原位");
            }

            const resultText = `将相机${parts.join("，")}`;

            const promptInput = document.getElementById('promptInput');
            // Check if there is existing content, if so append new line
            if (promptInput.value.trim()) {
                promptInput.value += '\n' + resultText;
            } else {
                promptInput.value = resultText;
            }
            saveInputState();

            // Visual feedback
            promptInput.style.transition = "0.2s";
            promptInput.style.borderColor = "#000";
            promptInput.style.boxShadow = "0 0 0 2px rgba(0,0,0,0.1)";
            setTimeout(() => {
                promptInput.style.borderColor = "";
                promptInput.style.boxShadow = "";
            }, 500);
        }

        async function runCloudTask() {
            if (!uploadedFile) throw new Error("Please upload an image first");

            // Get token from centralized management (Personal -> Global)
            let token = storage.getItem('modelscope_api_token');
            
            if (!token) {
                try {
                    const res = await fetch('/api/config/token');
                    if (res.ok) {
                        const data = await res.json();
                        if (data.token) token = data.token;
                    }
                } catch (e) {
                    console.warn("Failed to fetch global token", e);
                }
            }

            if (!token) {
                if (window.parent && typeof window.parent.openTokenModal === 'function') {
                    window.parent.openTokenModal();
                    // Allow the error to propagate so user sees the message
                    // const err = new Error("请先点击右上角设置 ModelScope Token");
                    // err.silent = true;
                    // throw err;
                }
                throw new Error("请先点击右上角设置 ModelScope Token");
            }

            // Convert image to Base64
            const toBase64 = file => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });

            const dataUri = await toBase64(uploadedFile);
            console.log("DataURI generated, length:", dataUri.length);

            // Submit task via dedicated Angle endpoint
            // Get Client ID from parent if available
            let clientId = null;
            try {
                if (window.parent && window.parent.CID) {
                    clientId = window.parent.CID;
                }
            } catch (e) { console.warn("Cannot access parent CID", e); }

            const payload = {
                "prompt": promptInput.value,
                "api_key": token,
                "type": "angle",
                "model": "Qwen/Qwen-Image-Edit-2511",
                "image_urls": [dataUri],
                "client_id": clientId
            };

            // Reset Progress Bar
            document.getElementById('cloud-progress-container').classList.add('hidden');
            document.getElementById('cloud-progress-bar').style.width = '0%';
            document.getElementById('cloud-percent').innerText = '0%';

            let response;
            try {
                 response = await fetch('/api/angle/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (netErr) {
                 throw new Error(`Network Error: ${netErr.message}`);
            }

            // Handle Timeout / Continue Loop
            while (response.ok) {
                 const data = await response.json();
                 
                 // If success with URL
                 if (data.url) {
                     return { images: [data.url] };
                 }

                 // If timeout status, ask user
                 if (data.status === 'timeout') {
                     const taskId = data.task_id;
                     const userContinue = confirm("Cloud generation is taking longer than expected (300s). The queue might be full.\n\nDo you want to continue waiting?");
                     
                     if (userContinue) {
                         // Call poll endpoint
                         const pollPayload = {
                             "task_id": taskId,
                             "api_key": token,
                             "client_id": clientId
                         };
                         
                         // Update UI to show we are still waiting
                         updateCloudProgress({status: "Resuming...", progress: 0, total: 150});
                         
                         response = await fetch('/api/angle/poll_status', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(pollPayload)
                         });
                         continue; // Loop back to check response
                     } else {
                         throw new Error("User cancelled waiting.");
                     }
                 }
                 
                 // Unknown success response
                 throw new Error("Unknown response format");
            }

            if (!response.ok) {
                 const errText = await response.text();
                 // Try to parse JSON error if possible
                 try {
                     const errJson = JSON.parse(errText);
                     if (errJson.detail) throw new Error(errJson.detail);
                 } catch (e) {}
                 throw new Error(`Generation Failed: ${errText}`);
            }

            const data = await response.json();
            if (data.url) {
                return {
                    images: [data.url]
                };
            } else {
                throw new Error("No image URL in response");
            }
        }

        async function handleGenerate() {
            if (!uploadedPath && currentEngine === 'local') {
                // ... existing local check ...
                const dropzone = document.getElementById('dropzone');
                dropzone.style.transition = "0.2s";
                dropzone.style.borderColor = "#ef4444";
                dropzone.style.transform = "scale(0.98)";
                setTimeout(() => {
                    dropzone.style.borderColor = "";
                    dropzone.style.transform = "scale(1)";
                }, 300);
                return;
            }
            
            if (!uploadedFile && currentEngine === 'cloud') {
                 alert("Please upload an image first");
                 return;
            }

            const btn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');

            btn.disabled = true;
            btn.style.backgroundColor = '#333';
            btn.innerHTML = `<i data-lucide="zap" class="w-4 h-4 text-yellow-400 fill-yellow-400 animate-pulse"></i><span class="tracking-[0.4em] text-[11px] uppercase">Processing...</span>`;
            lucide.createIcons();

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('outputImg').classList.add('hidden');
            document.getElementById('textResult').classList.add('hidden'); // Ensure text result is hidden
            document.getElementById('loadingState').classList.remove('hidden');

            try {
                let data;
                markPendingResult('angle');
                
                if (currentEngine === 'cloud') {
                    // Cloud Logic
                    data = await runCloudTask();
                } else {
                    // Local Logic
                    const seed = Math.floor(Math.random() * 1000000000000000);
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            workflow_json: "Angle control.json",
                            params: {
                                "252": { "image": uploadedPath },
                                "3": {
                                    "horizontal_angle": ((Number(document.getElementById('rotate-h').value) || 0) + 360) % 360,
                                    "vertical_angle": Number(document.getElementById('rotate-v').value) || 0,
                                    "zoom": Number(document.getElementById('distance').value) || 4
                                },
                                "253:243": { "seed": seed }
                            },
                            type: "angle",
                            client_id: CLIENT_ID
                        })
                    });
                    data = await res.json();
                    if (data.error) throw new Error(data.error);
                    if (!data.images?.length) throw new Error("No images returned");
                }

                clearPendingResult();
                showResult(data);

                resetGenerateButton();

                // Add to history
                renderImageCard({
                    images: data.images,
                    prompt: promptInput.value,
                    timestamp: Date.now(),
                    is_cloud: (currentEngine === 'cloud')
                }, true);

            } catch (err) {
                clearPendingResult();
                console.error(err);
                btn.style.backgroundColor = '';
                btn.innerHTML = `<i data-lucide="zap" class="w-4 h-4 text-yellow-400"></i><span id="btnText">Generation Failed</span>`;
                lucide.createIcons();
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                btn.disabled = false;
                if (!err.silent) {
                    alert(err.message);
                }
            }
        }

        window.copyText = () => {
            const text = document.getElementById('generatedText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('#textResult button');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> Copied`;
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    lucide.createIcons();
                }, 2000);
            });
        };

        // History Management
        function showResult(data) {
            if (!data?.images?.[0]) return;
            currentResult = data;
            const outputImg = document.getElementById('outputImg');
            const downloadBtn = document.getElementById('downloadBtn');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('textResult').classList.add('hidden');
            outputImg.src = data.images[0];
            outputImg.classList.remove('hidden');
            downloadBtn.href = data.images[0];
            downloadBtn.classList.remove('hidden');
            downloadBtn.download = `Angle-${data.timestamp || Date.now()}.png`;
        }

        function markPendingResult(type) {
            saveInputState({ running: true });
            storage.setItem(PENDING_RESULT_KEY, JSON.stringify({
                client_id: CLIENT_ID,
                type,
                started_at: Date.now(),
                uploadedPath,
                previewSrc: previewImg.src || ''
            }));
        }

        function clearPendingResult() {
            storage.removeItem(PENDING_RESULT_KEY);
            saveInputState({ running: false });
        }

        function restorePendingResult(history) {
            let pending = null;
            try { pending = JSON.parse(storage.getItem(PENDING_RESULT_KEY) || 'null'); } catch (e) { }
            if (!pending) return;
            if (pending.previewSrc || pending.uploadedPath) {
                uploadedPath = pending.uploadedPath || uploadedPath;
                applyInputPreview(pending.previewSrc || previewImg.src || '');
                showPendingLoading();
            }
            const match = (history || []).find(item => {
                const itemTs = Number(item.timestamp || 0) * 1000;
                return item?.images?.[0] && item.client_id === pending.client_id && item.type === pending.type && itemTs >= pending.started_at - 3000;
            });
            if (match) {
                showResult(match);
                clearPendingResult();
                resetGenerateButton();
                return;
            }
            if (Date.now() - pending.started_at > 30 * 60 * 1000) {
                clearPendingResult();
                resetGenerateButton();
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            setTimeout(loadHistory, 2000);
        }

        function renderImageCard(data, isNew = false) {
            const masonry = document.getElementById('masonry');
            const imgUrl = data.images ? data.images[0] : '';
            if (!imgUrl) return;

            const card = document.createElement('div');
            card.id = `h-${data.timestamp}`;
            card.className = "masonry-item relative group cursor-pointer";

            card.onclick = () => openLightbox(imgUrl);
            
            // ModelScope Badge
            const isCloud = data.is_cloud || (imgUrl && imgUrl.includes('cloud_angle'));
            const badgeHtml = isCloud ? `
                <div class="absolute top-3 left-3 z-10">
                    <img src="/static/modelscope.gif" class="h-4 w-auto object-contain bg-white/90 rounded-full p-0.5 shadow-sm">
                </div>
            ` : '';

            card.innerHTML = `
                <img src="${imgUrl}" class="w-full h-full object-cover block transform group-hover:scale-105 transition-transform duration-[1.5s]">
                ${badgeHtml}
                <button type="button" class="archive-delete absolute top-4 right-4 z-20 w-12 h-10 rounded-2xl bg-black text-white shadow-xl flex items-center justify-center opacity-0 group-hover:opacity-100 hover:bg-gray-900 transition-all" title="删除" aria-label="删除归档图片">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 p-6 flex flex-col justify-end pointer-events-none">
                    <p class="text-white text-[10px] font-bold uppercase tracking-widest line-clamp-2">${data.prompt || "Angle Control"}</p>
                </div>
            `;

            card.querySelector('.archive-delete').onclick = event => deleteHistoryItem(data.timestamp, event);
            if (isNew) masonry.prepend(card);
            else masonry.appendChild(card);
            lucide.createIcons();
        }

        async function deleteHistoryItem(timestamp, event) {
            event.stopPropagation();
            if (!confirm("删除这张图片？")) return;
            try {
                const res = await fetch('/api/history/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ timestamp })
                });
                const data = await res.json();
                if (data.success) document.getElementById(`h-${timestamp}`)?.remove();
                else alert(data.message || "删除失败");
            } catch (e) {
                alert("删除失败");
            }
        }

        function loadNextPage() {
            const batch = allHistory.slice(currentIndex, currentIndex + PAGE_SIZE);
            if (batch.length === 0) {
                const el = document.getElementById('loadMoreTrigger');
                if (el) el.innerText = "End of Archive";
                return;
            }
            batch.forEach(item => renderImageCard(item, false));
            currentIndex += PAGE_SIZE;
        }

        async function loadHistory() {
            try {
                const res = await fetch('/api/history?type=angle');
                const history = await res.json();
                if (history && Array.isArray(history)) {
                    allHistory = history;
                    document.getElementById('masonry').innerHTML = '';
                    currentIndex = 0;
                    loadNextPage();
                    restorePendingResult(history);
                }
            } catch (e) { console.error(e); }
        }

        // Lightbox
        function openLightbox(url) {
            const img = document.getElementById('lightboxImg');
            const resPill = document.getElementById('lightboxRes');

            resPill.style.opacity = '0';
            img.src = url;

            const lb = document.getElementById('lightbox');
            lb.classList.replace('hidden', 'flex');
            img.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            const updateRes = () => {
                if (img.naturalWidth) {
                    resPill.innerText = `${img.naturalWidth} x ${img.naturalHeight}`;
                    resPill.style.opacity = '1';
                }
            };

            img.onload = updateRes;
            if (img.complete) updateRes();
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        function handleOutsideClick(e) {
            if (e.target.id === 'lightbox') closeLightbox();
        }

        function downloadLightboxImage() {
            const imgUrl = document.getElementById('lightboxImg').src;
            const link = document.createElement('a');
            link.href = imgUrl;
            link.download = `Angle-Master-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function zoomImage() {
            if (currentResult && currentResult.images && currentResult.images[0]) {
                openLightbox(currentResult.images[0]);
            }
        }

        // Init
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && allHistory.length > 0) {
                loadNextPage();
            }
        }, { threshold: 0.1 });

        window.onload = () => {
            restoreInputState();
            ['promptInput','rotate-h','rotate-v','distance'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', () => saveInputState());
            });
            loadHistory();
            observer.observe(document.getElementById('loadMoreTrigger'));
        };

        // WebSocket for real-time updates (optional but good for multi-tab sync)
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws/stats?client_id=${CLIENT_ID}`;
        const socket = new WebSocket(wsUrl);
        socket.onopen = () => {
            setInterval(() => {
                if (socket.readyState === WebSocket.OPEN) socket.send("ping");
            }, 30000);
        };
    </script>
